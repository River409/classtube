<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classtube</title>
<style>
/* =========================
   AVATAR (GLOBAL)
========================= */
.avatar {
    width: 30px;
    height: 30px;
    border-radius: 2px;
    border: 1px solid #888;
    background-size: cover;
    background-position: center;
    display: inline-block;
}

/* =========================
   HEADER LINKS
========================= */
#headerLinks a {
    font-size: 13px;
    font-weight: bold;
    margin-right: 12px;
    color: #0066cc;
    text-decoration: none;
}

#headerLinks a:hover {
    text-decoration: underline;
}

/* =========================
   GENERAL
========================= */
body {
    margin: 0;
    font-family: Tahoma, sans-serif;
    background: #f1f1f1;
    color: #333;
}

/* =========================
   HEADER
========================= */
#headerTable {
    width: 100%;
    border: none;
    background: linear-gradient(#f8f8f8, #e6e6e6);
    border-bottom: 1px solid #ccc;
    padding: 6px 10px;
}

#logoImg {
    height: 60px;
    vertical-align: middle;
}

/* =========================
   PROFILE LAYOUT
========================= */
#profileSection {
    background: #fff;
    padding: 15px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

#profileHeader {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* big avatar */
#profileHeader .avatar {
    width: 90px;
    height: 90px;
    border-radius: 4px;
    border: 1px solid #888;
    flex-shrink: 0;
}

#profileText {
    display: flex;
    flex-direction: column;
}

/* username */
#profileUsername {
    font-size: 24px;
    font-weight: bold;
    color: #0066cc;
    margin: 0;
}

/* bio */
#profileBio {
    font-size: 13px;
    color: #333;
    margin-top: 6px;
    line-height: 1.4;
}

/* join date */
#profileJoinDate {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
}

/* =========================
   VIDEOS TITLE
========================= */
#profileVideosTitle {
    margin-top: 15px;
    font-size: 14px;
    font-weight: bold;
    color: #333;
}

/* =========================
   BUTTONS
========================= */
button, input[type="button"] {
    font-size: 12px;
    padding: 5px 10px;
    border: 1px solid #999;
    border-radius: 3px;
    background: linear-gradient(#ffffff, #dddddd);
    cursor: pointer;
}

button:hover, input[type="button"]:hover {
    background: linear-gradient(#ffffff, #eeeeee);
}

/* =========================
   INPUTS
========================= */
input, textarea {
    border: 1px solid #aaa;
    padding: 5px;
    font-size: 12px;
    border-radius: 2px;
    background: #fff;
}

/* =========================
   USER LIST
========================= */
#userList table {
    border: none;
    border-collapse: collapse;
    width: 100%;
}

#userList th {
    display: none;
}

#userList tr {
    display: flex;
    align-items: center;
    padding: 4px 0;
    background: transparent;
}

#userList td {
    border: none;
    padding: 0;
}

#userList td:nth-child(n+3) {
    display: none;
}

#userList td:first-child {
    margin-right: 8px;
}

#userList td:nth-child(2) {
    font-size: 13px;
    font-weight: bold;
    color: #0066cc;
}

/* =========================
   FOOTER
========================= */
#footer {
    margin-top: 40px;
    padding: 12px;
    text-align: center;
    background: #e6e6e6;
    border-top: 1px solid #ccc;
    font-size: 12px;
}

/* =========================
   MOBILE UI (BIG + CENTERED)
========================= */
@media (max-width: 768px) {

  body {
    font-size: 16px;
  }

  /* HEADER CENTERING */
  #headerTable {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* CENTER LOGO */
  #logoImg {
    height: 55px;
    display: block;
    margin: 0 auto;
  }

  /* CENTER NAV LINKS */
  #headerLinks {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
    float: none;
  }

  #headerLinks a {
    font-size: 16px;
    padding: 8px 10px;
  }

  /* BUTTONS BIGGER */
  button,
  input[type="button"] {
    font-size: 14px;
    padding: 10px 14px;
  }

  /* INPUTS BIGGER */
  input, textarea {
    font-size: 15px;
    padding: 10px;
  }

  /* VIDEO GRID */
  #homeThumbnails div {
    width: 95%;
    margin: 0 auto;
    border-radius: 6px;
    overflow: hidden;
  }

  #homeThumbnails img,
  #homeThumbnails iframe {
    width: 100%;
    height: auto;
  }

  .videoTitle {
    font-size: 16px;
  }

  /* PROFILE BIGGER */
  #profileHeader {
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  #profileHeader .avatar {
    width: 120px;
    height: 120px;
  }

  #profileUsername {
    font-size: 26px;
  }

  #profileBio {
    font-size: 15px;
  }

  #profileJoinDate {
    font-size: 13px;
  }

  /* VIDEO PLAYER BIGGER */
  #videoPlayerMain iframe {
    width: 100%;
    height: 260px;
  }

  /* USER LIST TEXT */
  #userList td:nth-child(2) {
    font-size: 16px;
  }

  /* TAP FRIENDLY */
  .videoTitle,
  #headerLinks a {
    min-height: 44px;
    display: inline-block;
  }
}
.videoTitle { cursor:pointer; color:blue; font-weight:500; margin:3px 0; }
.videoMeta { color:grey; font-size:12px; margin-bottom:5px; }
#videoPlayerWrapper { display:flex; gap:20px; }
#videoPlayerMain { flex:2; }
#otherVideos { flex:1; display:flex; flex-direction:column; gap:10px; overflow-y:auto; padding-top:5px; }
#otherVideos div { cursor:pointer; display:flex; flex-direction:column; }
#homeThumbnails { display:flex; flex-wrap:wrap; gap:10px; padding-top:5px; margin-bottom:15px; }
#homeThumbnails div { cursor:pointer; display:flex; flex-direction:column; width:160px; }
#homeThumbnails iframe { width:160px; height:90px; border:1px solid #000; }
.channelHeader { font-weight:bold; margin-bottom:5px; cursor:pointer; color:blue; }
.channelBio { font-style:italic; margin-bottom:15px; }
.tabButtons { margin-bottom:10px; }
.tabButtons button { margin-right:5px; padding:5px 10px; cursor:pointer; border:2px outset #ccc; background:#ddd; font-weight:bold; }
button:active { border:2px inset #ccc; }
table { border:2px solid #000; background:#eee; }
</style>
</head>
<body>

<table width="100%" border="0">
<tr>
<td>

    <div id="profileUsername"></div>

  <img id="watermark" src="watermark.png">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, getDocs, addDoc, query, orderBy, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyC2QdW6Gq3dnFf2JL4-vET-68M6LvTJUvw",
  authDomain:"classtube2-1436a.firebaseapp.com",
  projectId:"classtube2-1436a",
  storageBucket:"classtube2-1436a.firebasestorage.app",
  messagingSenderId:"290016676161",
  appId:"1:290016676161:web:1f88361dcb31ad31fd79c0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;
let currentVideoId = null;

const defaultAvatar = "https://preview.redd.it/old-youtube-default-icons-v0-h68mdg17af661.png?width=250&format=png&auto=webp&s=0e7d4140dafde9e52ca6b36204ebb11bd822f3e9";
const avatarBaseURL = "https://cdn.jsdelivr.net/gh/River409/classtube@main/colors/";

const avatarImages = [
  "dark_grey.jpeg",
  "Orange_intense.jpeg",
  "blue_purple.jpeg",
  "Green.jpeg",
  "brown.jpeg",
  "cyan.jpeg",
  "dark_blue.jpeg",
  "dark_green.jpeg",
  "dark_pink.jpeg",
  "gray.jpeg",
  "green_blue.jpeg",
  "light_brown.jpeg",
  "magenta.jpeg",
  "orange.jpeg",
  "pink.jpeg",
  "purple.jpeg",
  "purple2.jpeg",
  "purple3.jpeg",
  "red.jpeg",
  "teal.jpeg",
];

function getAvatarFromUsername(username){
  let hash = 0;
  for(let i = 0; i < username.length; i++){
    hash = username.charCodeAt(i) + ((hash << 5) - hash);
  }
  const index = Math.abs(hash) % avatarImages.length;
  return avatarBaseURL + avatarImages[index];
}
function createAvatar(name){
  const div = document.createElement("div");
  div.className="avatar";

  const avatarUrl = getAvatarFromUsername(name);

  div.style.backgroundImage = `url('${avatarUrl}')`;
  div.title = name;

  return div;
}

const status = document.getElementById('status');
const headerLinks = document.getElementById('headerLinks');
const userEmail = document.getElementById('userEmail');

function showSection(section){
  document.getElementById("loginSection").style.display = (section==="login")?"block":"none";
  document.getElementById("feedSection").style.display = (section==="feed")?"block":"none";
  document.getElementById("profileSection").style.display = (section==="profile")?"block":"none";
  document.getElementById("videoPlayerSection").style.display = (section==="player")?"block":"none";
}

// TABS
document.getElementById('videosTab').onclick = ()=>{ document.getElementById('videosSection').style.display="block"; document.getElementById('peopleSection').style.display="none"; };
document.getElementById('peopleTab').onclick = ()=>{ document.getElementById('videosSection').style.display="none"; document.getElementById('peopleSection').style.display="block"; };

// AUTH STATE
onAuthStateChanged(auth, async user => {
  if(!user){ showSection("login"); headerLinks.style.display="none"; status.innerText="Please login."; return; }
  currentUser=user;
  showSection("feed");
  headerLinks.style.display="inline";
  userEmail.innerText=user.email;
  await loadUsers();
  await loadVideos();
  await loadProfile();
});

// SIGNUP/LOGIN/LOGOUT
document.getElementById('signupBtn').onclick=async ()=>{
  const username=document.getElementById('signupUsername').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const password=document.getElementById('signupPassword').value;
  if(!username){ status.innerText="Username required"; return; }
  try{
    const userCred=await createUserWithEmailAndPassword(auth,email,password);
    await setDoc(doc(db,"users",userCred.user.uid),{username,email,bio:"",createdAt:new Date()});
    document.getElementById('signupUsername').value="";
    document.getElementById('signupEmail').value="";
    document.getElementById('signupPassword').value="";
    status.innerText="Account created!";
  }catch(err){ status.innerText=err.message; }
};
document.getElementById('loginBtn').onclick=async ()=>{
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  try{ await signInWithEmailAndPassword(auth,email,password); } catch(err){ status.innerText=err.message; }
};
document.getElementById("logoutBtn").onclick=async ()=>{ await signOut(auth); showSection("login"); };

// PROFILE BUTTON
document.getElementById("myProfileBtn").onclick=()=>loadProfile(true);
document.getElementById("homeBtn").onclick=()=>{ showSection('feed'); loadVideos(); loadUsers(); };

// SAVE BIO
document.getElementById('saveBioBtn').onclick=async ()=>{
  const bio=document.getElementById('bio').value.trim();
  if(!currentUser) return;
  try{ await updateDoc(doc(db,"users",currentUser.uid), { bio }); document.getElementById('profileStatus').innerText="Bio saved!"; }
  catch(err){ document.getElementById('profileStatus').innerText="Error: "+err.message; }
};

// LOAD USERS
async function loadUsers(){
  const snapshot=await getDocs(collection(db,"users"));
  let html="<table border='1' cellpadding='5'><tr><th>Avatar</th><th>Username</th><th>Bio</th></tr>";
  snapshot.forEach(doc=>{
    const data=doc.data();
    html+=`<tr onclick="showUserProfile('${doc.id}')">
      <td>${createAvatar(data.username).outerHTML}</td>
      <td>${data.username}</td>
      <td>${data.bio||""}</td>
    </tr>`;
  });
  html+="</table>"; document.getElementById('userList').innerHTML=html;
}

// LOAD VIDEOS (24 RANDOM) — using stored thumbnails
async function loadVideos() {
  const snapshot = await getDocs(collection(db, "videos"));
  const allVideos = [];
  snapshot.forEach(doc => allVideos.push({ id: doc.id, data: doc.data() }));

  const selected = [];
  while (selected.length < 24 && allVideos.length > 0) {
    const idx = Math.floor(Math.random() * allVideos.length);
    selected.push(allVideos[idx]);
    allVideos.splice(idx, 1);
  }

  let html = "";
  selected.forEach(v => {
    const thumb = v.data.thumbnail || "https://via.placeholder.com/160x90.png?text=Video"; // fallback
    html += `
      <div onclick="playVideo('${v.id}')">
        <img src="${thumb}" width="160" height="90" style="object-fit:cover; border:1px solid #000;">
        <div class="videoTitle">${v.data.title}</div>
      </div>
    `;
  });

  document.getElementById('homeThumbnails').innerHTML = html;
}
// LOAD USER VIDEOS

async function loadUserVideos(profileUid) {
  if (!profileUid) return;

  const snapshot = await getDocs(collection(db, "videos"));

  let html = "";
  let count = 0;

  snapshot.forEach(docSnap => {
    const video = docSnap.data();

    // SAFE CHECK
    if (video.userId === profileUid) {
      count++;

      const thumb = video.thumbnail || "https://via.placeholder.com/160x90.png?text=Video";

      html += `
        <div onclick="playVideo('${docSnap.id}')" style="margin-bottom:10px; cursor:pointer;">
          <img src="${thumb}" width="160" height="90" style="border:1px solid #000; object-fit:cover;">
          <div class="videoTitle">${video.title || "Untitled"}</div>
        </div>
      `;
    }
  });

  if (count === 0) {
    html = "<p style='color:gray;'>No videos uploaded yet.</p>";
  }

  document.getElementById('userVideos').innerHTML = html;
}
// PLAY VIDEO
window.playVideo = async function(videoId){
  showSection("player");
  currentVideoId = videoId;
  const docSnap = await getDoc(doc(db,"videos",videoId));
  if(!docSnap.exists()) return;
  const data = docSnap.data();

  // Increment views
  const newViews = (data.views || 0) + 1;
  await updateDoc(doc(db,"videos",videoId), { views: newViews });
  data.views = newViews;

  document.getElementById('playerTitle').innerText = data.title;
  const avatarUrl = getAvatarFromUsername(data.user);
  document.getElementById('playerUploader').innerHTML = `
    <div class='avatar' style='background-image:url("${avatarUrl}")'></div>
    <span class='channelHeader' onclick="showUserProfileByName('${data.user}')">${data.user}</span>
  `;
  document.getElementById('playerIframe').src = data.url.replace("/view","/preview");
  document.getElementById('playerDescription').innerText = data.description || "";
  const createdAt = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt.seconds*1000);
  const diffDays = Math.floor((new Date() - createdAt)/(1000*60*60*24));
  document.getElementById('playerStats').innerText = (data.views||0) + " views • " + (diffDays < 30 ? diffDays + " days ago" : Math.floor(diffDays/30) + " months ago");

  // RANDOM 6 VIDEOS SIDEBAR with thumbnails
  const snapshot = await getDocs(collection(db,"videos"));
  const allVid = [];
  snapshot.forEach(d => { if(d.id !== videoId) allVid.push({id: d.id, data: d.data()}); });

  const sel = [];
  while(sel.length < 6 && allVid.length > 0){
    const idx = Math.floor(Math.random() * allVid.length);
    sel.push(allVid[idx]);
    allVid.splice(idx,1);
  }

  let htmlOther = "";
  sel.forEach(v => {
    let thumbUrl = v.data.url;
    if(thumbUrl.includes("drive.google.com")){
      const match = thumbUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if(match) thumbUrl = `https://drive.google.com/thumbnail?id=${match[1]}&sz=w140-h80`;
    }

    htmlOther += `
      <div onclick="playVideo('${v.id}')">
        <div>${v.data.title}</div>
        <img src="${thumbUrl}" width="140" height="80" style="border:1px solid #000; border-radius:3px;">
      </div>
    `;
  });
  document.getElementById('otherVideos').innerHTML = htmlOther;
};
// PLAY VIDEO
window.playVideo=async function(videoId){
  showSection("player");
  currentVideoId=videoId;
  const docSnap=await getDoc(doc(db,"videos",videoId));
  if(!docSnap.exists()) return;
  const data=docSnap.data();
// Increment views
const newViews = (data.views || 0) + 1;
await updateDoc(doc(db,"videos",videoId), { views: newViews });
data.views = newViews;
  document.getElementById('playerTitle').innerText=data.title;
  const avatarUrl = getAvatarFromUsername(data.user);

document.getElementById('playerUploader').innerHTML=`
  <div class='avatar' style='background-image:url("${avatarUrl}")'></div>
  <span class='channelHeader' onclick="showUserProfileByName('${data.user}')">${data.user}</span>
`;
  document.getElementById('playerIframe').src=data.url.replace("/view","/preview");
  document.getElementById('playerDescription').innerText=data.description||"";
  const createdAt = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt.seconds*1000);
  const diffDays = Math.floor((new Date()-createdAt)/(1000*60*60*24));
  document.getElementById('playerStats').innerText=(data.views||0)+" views • "+(diffDays<30?diffDays+" days ago":Math.floor(diffDays/30)+" months ago");

  // RANDOM 6 VIDEOS SIDEBAR
  const snapshot=await getDocs(collection(db,"videos"));
  const allVid=[];

  let htmlOther="";

  });
  document.getElementById('otherVideos').innerHTML=htmlOther;
};

// UPLOAD VIDEO
document.getElementById('postVideoBtn').onclick=async ()=>{
  const title=document.getElementById('videoTitle').value.trim();
  const url=document.getElementById('videoURL').value.trim();
  const description=document.getElementById('videoDescription').value.trim();
  if(!title||!url){ alert("Title and URL required"); return; }
  await addDoc(collection(db,"videos"),{ title,url,description,user:currentUser.displayName||currentUser.email,userId:currentUser.uid,createdAt:new Date(),views:0 });
  document.getElementById('videoTitle').value="";
  document.getElementById('videoURL').value="";
  document.getElementById('videoDescription').value="";
  await loadVideos(); alert("Video uploaded!");
};

// SHOW PROFILE BY UID

window.showUserProfile = async function(uid){
  showSection('profile');

  const docSnap = await getDoc(doc(db,"users",uid));
  if(!docSnap.exists()) return;

  renderProfileUI(docSnap.data(), uid);
};// SHOW PROFILE BY NAME (clickable uploader)
window.showUserProfileByName=async function(username){
  const snapshot=await getDocs(collection(db,"users"));
  snapshot.forEach(doc=>{
    if(doc.data().username===username) showUserProfile(doc.id);
  });
};

// LOAD PROFILE


async function loadProfile(fromButton=false){
  if(!currentUser) return;

  const docSnap = await getDoc(doc(db,"users",currentUser.uid));
  if(!docSnap.exists()) return;

  const data = docSnap.data();

  if(fromButton) showSection('profile');

  renderProfileUI(data, currentUser.uid);
}

function renderProfileUI(data, uid){

  // username
  document.getElementById('profileUsername').innerText = data.username || "";

  // bio (CLEAR first to avoid leftover text)
  const bioText = data.bio || "";
  document.getElementById('profileBio').innerText = bioText;
  document.getElementById('bio').value = bioText;

  // join date
  const createdAt = data.createdAt?.toDate
    ? data.createdAt.toDate()
    : new Date(data.createdAt?.seconds * 1000);

  document.getElementById('profileJoinDate').innerText =
    "Joined on " + createdAt.toDateString();

  // avatar (CLEAR FIRST — THIS FIXES YOUR BUG)
  const avatarEl = document.getElementById('profileAvatar');

  if (avatarEl) {
    avatarEl.style.backgroundImage = "none"; // IMPORTANT RESET
    avatarEl.style.backgroundImage =
      `url('${getAvatarFromUsername(data.username || "")}')`;
  }

  // permissions (ONLY for current user)
  const isMe = uid === currentUser.uid;

  document.getElementById('bio').readOnly = !isMe;
  document.getElementById('uploadSection').style.display = isMe ? "block" : "none";
  document.getElementById('saveBioBtn').style.display = isMe ? "inline-block" : "none";

  loadUserVideos(uid);
}
// SEARCH
document.getElementById('searchInput').addEventListener('input',async ()=>{
  const queryText=document.getElementById('searchInput').value.toLowerCase();
  const videosSnap=await getDocs(collection(db,"videos"));
  let html="";
  videosSnap.forEach(doc=>{
    const data=doc.data();
    if(data.title.toLowerCase().includes(queryText)) html+=`<div onclick="playVideo('${doc.id}')"><iframe src="${data.url.replace("/view","/preview")}" frameborder="0" width="160" height="90"></iframe><div class="videoTitle">${data.title}</div></div>`;
  });
  document.getElementById('homeThumbnails').innerHTML=html;

  const usersSnap=await getDocs(collection(db,"users"));
  let userHtml="<table border='1' cellpadding='5'><tr><th>Avatar</th><th>Username</th><th>Bio</th></tr>";
  usersSnap.forEach(doc=>{
    const data=doc.data();
    if(data.username.toLowerCase().includes(queryText)) userHtml+=`<tr onclick="showUserProfile('${doc.id}')"><td>${createAvatar(data.username).outerHTML}</td><td>${data.username}</td><td>${data.bio||""}</td></tr>`;
  });
  userHtml+="</table>";
  document.getElementById('userList').innerHTML=userHtml;
});
