<!DOCTYPE html>

<html>
<head>
<title>ClassTube</title>

<style>

body{margin:0;font-family:Arial;background:white;}

.avatar{
width:30px;
height:30px;
border-radius:50%;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
}

.videoGrid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:18px;
}

.videoCard{width:160px;cursor:pointer;}

.videoCard iframe{width:160px;height:90px;}

.videoTitle{font-size:14px;margin-top:4px;color:blue;}

#videoPlayerWrapper{
display:flex;
justify-content:space-between;
}

#otherVideos{
width:260px;
display:flex;
flex-direction:column;
gap:12px;
margin-left:auto;
}

#otherVideos iframe{
width:240px;
height:135px;
}

</style>

</head>

<body>

<table width="100%" border="1">
<tr>
<td>

<b>ClassTube</b>

<span id="headerLinks" style="float:right;display:none;">
<a href="#" id="homeBtn">Home</a> |
<a href="#" id="myProfileBtn">My Profile</a> |
<a href="#" id="logoutBtn">Logout</a>
</span>

</td>
</tr>
</table>

<div id="loginSection" style="width:300px;margin:50px auto;background:#DDD;padding:10px;border:1px solid #999;">

<h2>Login / Sign Up</h2>

<b>Sign Up</b><br><br>

Username<br> <input id="signupUsername"><br><br>

Email<br> <input id="signupEmail"><br><br>

Password<br> <input type="password" id="signupPassword"><br><br>

<input type="button" value="Create Account" id="signupBtn"><br><br>

<b>Login</b><br><br>

Email<br> <input id="loginEmail"><br><br>

Password<br> <input type="password" id="loginPassword"><br><br>

<input type="button" value="Login" id="loginBtn"><br><br>

<span id="status"></span>

</div>

<div id="feedSection" style="display:none;padding:20px">

<h3>Students</h3>
<div id="userList"></div>

<h3>All Videos</h3>
<div id="homeThumbnails" class="videoGrid"></div>

</div>

<div id="channelSection" style="display:none;padding:20px">

<h2 id="channelTitle"></h2>
<div id="channelBio" style="margin-bottom:20px;"></div>

<h3>Videos</h3>
<div id="channelVideos" class="videoGrid"></div>

</div>

<div id="profileSection" style="display:none;padding:20px">

<h3>My Channel</h3>

Bio<br>

<textarea id="bio" rows="4" cols="40"></textarea><br><br>

<input type="button" value="Save Bio" id="saveBioBtn">

<hr>

<h3>Upload Video</h3>

Title<br> <input id="videoTitle"><br><br>

Video URL<br> <input id="videoURL"><br><br>

<input type="button" value="Post Video" id="postVideoBtn">

</div>

<div id="videoPlayerSection" style="display:none;padding:20px">

<div id="videoPlayerWrapper">

<div>

<h3 id="playerTitle" class="videoTitle"></h3>

<div id="playerUploader" style="display:flex;gap:8px;align-items:center;"></div>

<iframe id="playerIframe" width="720" height="405" frameborder="0" allowfullscreen></iframe>

</div>

<div id="otherVideos"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, getDocs, addDoc, query, orderBy, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyC2QdW6Gq3dnFf2JL4-vET-68M6LvTJUvw",
authDomain:"classtube2-1436a.firebaseapp.com",
projectId:"classtube2-1436a",
storageBucket:"classtube2-1436a.firebasestorage.app",
messagingSenderId:"290016676161",
appId:"1:290016676161:web:1f88361dcb31ad31fd79c0"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser=null;

const avatarColors=[
"#AA47BD","#7B1FA2","#0388D2","#0098A7","#68A039","#EF6C00",
"#EC417A","#5D6AC0","#004D40","#34691E","#8C6E63","#512DA7"
];

function randomColor(){
return avatarColors[Math.floor(Math.random()*avatarColors.length)];
}

function showSection(id){

loginSection.style.display="none";
feedSection.style.display="none";
profileSection.style.display="none";
videoPlayerSection.style.display="none";
channelSection.style.display="none";

document.getElementById(id).style.display="block";

}

signupBtn.onclick=async()=>{

let username=signupUsername.value.trim();
let email=signupEmail.value.trim();
let pass=signupPassword.value;

let color=randomColor();

let cred=await createUserWithEmailAndPassword(auth,email,pass);

await setDoc(doc(db,"users",cred.user.uid),{
username,
bio:"",
color
});

};

loginBtn.onclick=async()=>{
await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
};

logoutBtn.onclick=()=>signOut(auth);

onAuthStateChanged(auth,async user=>{

if(!user){
showSection("loginSection");
headerLinks.style.display="none";
return;
}

currentUser=user;

headerLinks.style.display="inline";

showSection("feedSection");

loadUsers();
loadVideos();

});

async function loadUsers(){

let snap=await getDocs(collection(db,"users"));

let html="<table border=1 cellpadding=5>";

snap.forEach(docu=>{

let d=docu.data();

html+=`
<tr>

<td>
<div class="avatar" style="background:${d.color}" onclick="openChannel('${docu.id}','${d.username}')">
${d.username[0]}
</div>
</td>

<td onclick="openChannel('${docu.id}','${d.username}')">
${d.username}
</td>

<td>${d.bio||""}</td>

</tr>
`;

});

html+="</table>";

userList.innerHTML=html;

}

async function loadVideos(){

let q=query(collection(db,"videos"),orderBy("createdAt","desc"));
let snap=await getDocs(q);

let html="";

snap.forEach(v=>{

let d=v.data();

html+=`
<div class="videoCard" onclick="playVideo('${v.id}')">

<iframe src="${d.url.replace("/view","/preview")}" frameborder="0"></iframe>

<div class="videoTitle">${d.title}</div>

</div>
`;

});

homeThumbnails.innerHTML=html;

}

window.openChannel=async(uid,username)=>{

showSection("channelSection");

channelTitle.innerText=username+"'s channel";

let userDoc=await getDoc(doc(db,"users",uid));
let data=userDoc.data();

channelBio.innerText=data.bio||"";

let snap=await getDocs(collection(db,"videos"));

let html="";

snap.forEach(v=>{

let d=v.data();

if(d.userId===uid){

html+=`
<div class="videoCard" onclick="playVideo('${v.id}')">

<iframe src="${d.url.replace("/view","/preview")}" frameborder="0"></iframe>

<div class="videoTitle">${d.title}</div>

</div>
`;

}

});

channelVideos.innerHTML=html;

};

window.playVideo=async(id)=>{

showSection("videoPlayerSection");

let docSnap=await getDoc(doc(db,"videos",id));
let d=docSnap.data();

playerTitle.innerText=d.title;
playerIframe.src=d.url.replace("/view","/preview");

let userDoc=await getDoc(doc(db,"users",d.userId));
let user=userDoc.data();

playerUploader.innerHTML=`
<div class="avatar" style="background:${user.color}" onclick="openChannel('${d.userId}','${user.username}')">
${user.username[0]}
</div>
<span onclick="openChannel('${d.userId}','${user.username}')">${user.username}</span>
`;

let snap=await getDocs(collection(db,"videos"));

let vids=[];

snap.forEach(v=>{
if(v.id!==id) vids.push({id:v.id,data:v.data()});
});

vids.sort(()=>Math.random()-0.5);

let html="";

vids.slice(0,6).forEach(v=>{

html+=`
<div onclick="playVideo('${v.id}')">

<iframe src="${v.data.url.replace("/view","/preview")}" frameborder="0"></iframe>

<div class="videoTitle">${v.data.title}</div>

</div>
`;

});

otherVideos.innerHTML=html;

};

postVideoBtn.onclick=async()=>{

let title=videoTitle.value.trim();
let url=videoURL.value.trim();

let userDoc=await getDoc(doc(db,"users",currentUser.uid));
let user=userDoc.data();

await addDoc(collection(db,"videos"),{
title,
url,
userId:currentUser.uid,
username:user.username
});

loadVideos();

};

saveBioBtn.onclick=async()=>{
await updateDoc(doc(db,"users",currentUser.uid),{bio:bio.value});
};

homeBtn.onclick=()=>{
showSection("feedSection");
loadUsers();
loadVideos();
};

myProfileBtn.onclick=()=>{
showSection("profileSection");
};

</script>

</body>
</html>
