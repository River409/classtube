<!DOCTYPE html>
<html>
<head>
<title>Classtube</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#fff; }
.avatar {
    width:30px; height:30px; border:1px solid #888;
    display:flex; justify-content:center; align-items:center;
    background-size:cover; background-position:center;
    cursor:pointer;
}
.videoTitle { cursor:pointer; color:blue; margin:3px 0; }
.videoMeta { color:grey; font-size:12px; }
#videoPlayerWrapper { display:flex; gap:20px; }
#otherVideos { flex:1; display:flex; flex-direction:column; gap:10px; }
#homeThumbnails { display:flex; flex-wrap:wrap; gap:10px; }
#homeThumbnails div { width:160px; cursor:pointer; }
.tabButtons button { margin-right:5px; }
</style>
</head>
<body>

<table width="100%" border="1">
<tr>
<td>
<b>ClassTube</b>
<span style="float:right; display:none;" id="headerLinks">
<a href="#" id="homeBtn">Home</a> |
<a href="#" id="myProfileBtn">Profile</a> |
<a href="#" id="logoutBtn">Logout</a>
</span>
</td>
</tr>
</table>

<!-- LOGIN -->
<div id="loginSection">
<h3>Login / Sign Up</h3>

<b>Sign Up</b><br>
<input id="signupUsername" placeholder="Username"><br>
<input id="signupEmail" placeholder="Email"><br>
<input id="signupPassword" type="password" placeholder="Password"><br>
<button id="signupBtn">Create</button><br><br>

<b>Login</b><br>
<input id="loginEmail" placeholder="Email"><br>
<input id="loginPassword" type="password"><br>
<button id="loginBtn">Login</button><br>

<div id="status"></div>
</div>

<!-- FEED -->
<div id="feedSection" style="display:none;">
<h3>Welcome <span id="userEmail"></span></h3>

<input id="searchInput" placeholder="Search..." style="width:300px;"><br><br>

<div class="tabButtons">
<button id="videosTab">Videos</button>
<button id="peopleTab">People</button>
</div>

<div id="videosSection">
<div id="homeThumbnails"></div>
</div>

<div id="peopleSection" style="display:none;">
<div id="userList"></div>
</div>
</div>

<!-- PROFILE -->
<div id="profileSection" style="display:none;">
Username: <b id="profileUsername"></b><br>
Join: <span id="profileJoinDate"></span><br><br>

<textarea id="bio"></textarea><br>
<button id="saveBioBtn">Save Bio</button>
<div id="profileStatus"></div>

<h3>Videos</h3>
<div id="userVideos"></div>

<div id="uploadSection">
<input id="videoTitle" placeholder="Title"><br>
<textarea id="videoDescription"></textarea><br>
<input id="videoURL" placeholder="URL"><br>
<button id="postVideoBtn">Post</button>
</div>

<div id="reportSection" style="display:none;">
<button id="reportBtn">Report User</button>
<span id="reportStatus"></span>
</div>
</div>

<!-- VIDEO PLAYER -->
<div id="videoPlayerSection" style="display:none;">
<div id="videoPlayerWrapper">
<div>
<h3 id="playerTitle"></h3>
<div id="playerUploader"></div>
<iframe id="playerIframe" width="560" height="315"></iframe>
<div id="playerStats"></div>
<div id="playerDescription"></div>
</div>
<div id="otherVideos"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, getDocs, addDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC2QdW6Gq3dnFf2JL4-vET-68M6LvTJUvw",
  authDomain: "classtube2-1436a.firebaseapp.com",
  projectId: "classtube2-1436a",
  storageBucket: "classtube2-1436a.firebasestorage.app",
  messagingSenderId: "290016676161",
  appId: "1:290016676161:web:1f88361dcb31ad31fd79c0"
};

const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;

// Sections
function showSection(s){
  loginSection.style.display = s==="login"?"block":"none";
  feedSection.style.display = s==="feed"?"block":"none";
  profileSection.style.display = s==="profile"?"block":"none";
  videoPlayerSection.style.display = s==="player"?"block":"none";
}

// AUTH
signupBtn.onclick = async ()=>{
  const user = await createUserWithEmailAndPassword(auth, signupEmail.value, signupPassword.value);
  await setDoc(doc(db,"users",user.user.uid),{
    username: signupUsername.value,
    email: signupEmail.value,
    bio:"",
    createdAt:new Date()
  });
};

loginBtn.onclick = ()=>signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);

onAuthStateChanged(auth, async user=>{
  if(!user){ showSection("login"); return; }
  currentUser=user;
  headerLinks.style.display="inline";
  userEmail.innerText=user.email;
  showSection("feed");
  loadVideos();
  loadUsers();
});

// USERS
async function loadUsers(){
  const snap = await getDocs(collection(db,"users"));
  let html="<table border=1>";
  snap.forEach(d=>{
    const u=d.data();
    html+=`<tr onclick="showUserProfile('${d.id}')"><td>${u.username}</td><td>${u.bio}</td></tr>`;
  });
  html+="</table>";
  userList.innerHTML=html;
}

// 🔥 UPDATED: RANDOM 25 VIDEOS
async function loadVideos(){
  const snapshot = await getDocs(collection(db,"videos"));

  const allVideos = [];
  snapshot.forEach(doc=>{
    allVideos.push({ id: doc.id, data: doc.data() });
  });

  const selected = [];
  while(selected.length < 25 && allVideos.length > 0){
    const index = Math.floor(Math.random() * allVideos.length);
    selected.push(allVideos[index]);
    allVideos.splice(index, 1);
  }

  let html = "";
  selected.forEach(v=>{
    html += `
      <div onclick="playVideo('${v.id}')">
        <iframe src="${v.data.url.replace("/view","/preview")}" width="160" height="90"></iframe>
        <div class="videoTitle">${v.data.title}</div>
      </div>
    `;
  });

  homeThumbnails.innerHTML = html;
}

// PROFILE
window.showUserProfile = async uid=>{
  showSection("profile");
  const d = (await getDoc(doc(db,"users",uid))).data();
  profileUsername.innerText=d.username;
  profileUsername.dataset.uid=uid;
  bio.value=d.bio||"";

  if(uid!==currentUser.uid){
    uploadSection.style.display="none";
    saveBioBtn.style.display="none";
    reportSection.style.display="block";
  } else {
    uploadSection.style.display="block";
    saveBioBtn.style.display="inline";
    reportSection.style.display="none";
  }
};

// SAVE BIO
saveBioBtn.onclick = ()=>updateDoc(doc(db,"users",currentUser.uid),{bio:bio.value});

// REPORT
reportBtn.onclick = async ()=>{
  const uid = profileUsername.dataset.uid;
  const target = (await getDoc(doc(db,"users",uid))).data();

  await addDoc(collection(db,"reports"),{
    reporterUsername: currentUser.email,
    reporterUid: currentUser.uid,
    reportedUsername: target.username,
    reportedEmail: target.email,
    reportedUid: uid,
    createdAt:new Date()
  });

  reportStatus.innerText="Reported!";
};

// NAV
homeBtn.onclick=()=>{ showSection("feed"); loadVideos(); };
myProfileBtn.onclick=()=>showUserProfile(currentUser.uid);
logoutBtn.onclick=()=>signOut(auth);

// SEARCH
searchInput.oninput = async ()=>{
  const q=searchInput.value.toLowerCase();
  const snap = await getDocs(collection(db,"videos"));
  let html="";
  snap.forEach(d=>{
    if(d.data().title.toLowerCase().includes(q)){
      html+=`<div onclick="playVideo('${d.id}')">${d.data().title}</div>`;
    }
  });
  homeThumbnails.innerHTML=html;
};
</script>

</body>
</html>
