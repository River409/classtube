<body>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore,doc,setDoc,collection,getDocs,addDoc,query,orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyC2QdW6Gq3dnFf2JL4-vET-68M6LvTJUvw",
authDomain:"classtube2-1436a.firebaseapp.com",
projectId:"classtube2-1436a",
storageBucket:"classtube2-1436a.firebasestorage.app",
messagingSenderId:"290016676161",
appId:"1:290016676161:web:1f88361dcb31ad31fd79c0"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let allVideos=[];

function showSection(section){
loginSection.style.display="none";
feedSection.style.display="none";
profileSection.style.display="none";

if(section==="login") loginSection.style.display="block";
if(section==="feed") feedSection.style.display="block";
if(section==="profile") profileSection.style.display="block";
}

signupBtn.onclick=async()=>{
const username=signupUsername.value.trim();
const email=signupEmail.value.trim();
const password=signupPassword.value;

const cred=await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db,"users",cred.user.uid),{
username,
bio:""
});
};

loginBtn.onclick=async()=>{
await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
};

logoutBtn.onclick=()=>signOut(auth);

onAuthStateChanged(auth,async(user)=>{

if(!user){
showSection("login");
return;
}

headerLinks.style.display="inline";

userEmail.innerText=user.email;

showSection("feed");

loadVideos();

});

async function loadVideos(){

const q=query(collection(db,"videos"),orderBy("createdAt","desc"));
const snap=await getDocs(q);

allVideos=[];

snap.forEach(doc=>{
allVideos.push({id:doc.id,...doc.data()});
});

renderVideos(allVideos);

}

function renderVideos(videos){

let html="";

videos.forEach(v=>{

html+=`
<div onclick="playVideo('${v.id}')">
<iframe src="${v.url.replace('/view','/preview')}" frameborder="0"></iframe>
<div class="videoTitle">${v.title}</div>
</div>
`;

});

homeThumbnails.innerHTML=html;

}

searchBox.oninput=()=>{

const term=searchBox.value.toLowerCase();

const filtered=allVideos.filter(v=>
v.title.toLowerCase().includes(term)
);

renderVideos(filtered);

};

postVideoBtn.onclick=async()=>{

await addDoc(collection(db,"videos"),{
title:videoTitle.value,
url:videoURL.value,
createdAt:new Date()
});

videoTitle.value="";
videoURL.value="";

loadVideos();

};

homeBtn.onclick=()=>showSection("feed");
myProfileBtn.onclick=()=>showSection("profile");

window.playVideo = async function(id){

let video=null;

allVideos.forEach(v=>{
if(v.id===id) video=v;
});

if(!video) return;

const url=video.url.replace("/view","/preview");

const popup=document.createElement("div");
popup.style.position="fixed";
popup.style.top="50%";
popup.style.left="50%";
popup.style.transform="translate(-50%,-50%)";
popup.style.background="#fff";
popup.style.padding="20px";
popup.style.border="2px solid black";
popup.style.zIndex="9999";

const close=document.createElement("button");
close.innerText="Close";
close.onclick=()=>popup.remove();

const player=document.createElement("iframe");
player.width="560";
player.height="315";
player.src=url;
player.allowFullscreen=true;

popup.appendChild(close);
popup.appendChild(document.createElement("br"));
popup.appendChild(player);

document.body.appendChild(popup);

}

</script>

</body>
