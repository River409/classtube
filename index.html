<!DOCTYPE html>
<html>
<head>
<title>ClassTube</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
}

.avatar{
width:30px;
height:30px;
border-radius:50%;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.videoTitle{
color:blue;
cursor:pointer;
margin:4px 0;
}

.videoMeta{
color:grey;
font-size:12px;
}

#homeThumbnails{
display:flex;
flex-wrap:wrap;
gap:12px;
}

#homeThumbnails div{
width:160px;
cursor:pointer;
}

#homeThumbnails iframe{
width:160px;
height:90px;
}

#searchBox{
padding:6px;
width:260px;
margin-bottom:10px;
}

#loginSection{
width:300px;
margin:60px auto;
background:#ddd;
padding:15px;
border:1px solid #999;
}

</style>
</head>

<body>

<table width="100%" border="1">
<tr>
<td>

<b>ClassTube</b>

<span id="headerLinks" style="float:right;display:none;">
<a href="#" id="homeBtn">Home</a> |
<a href="#" id="myProfileBtn">My Profile</a> |
<a href="#" id="logoutBtn">Logout</a>
</span>

</td>
</tr>
</table>

<!-- LOGIN -->
<div id="loginSection">

<h2>Login / Sign Up</h2>

<b>Sign Up</b><br><br>

Username:<br>
<input id="signupUsername"><br><br>

Email:<br>
<input id="signupEmail"><br><br>

Password:<br>
<input type="password" id="signupPassword"><br><br>

<input type="button" value="Create Account" id="signupBtn"><br><br>

<b>Login</b><br><br>

Email:<br>
<input id="loginEmail"><br><br>

Password:<br>
<input type="password" id="loginPassword"><br><br>

<input type="button" value="Login" id="loginBtn"><br><br>

<span id="status"></span>

</div>

<!-- HOME FEED -->
<div id="feedSection" style="display:none;padding:20px;">

<h3>Welcome, <span id="userEmail"></span></h3>

<hr>

<h3>Students</h3>

<div id="userList"></div>

<h3>All Videos:</h3>

<input id="searchBox" placeholder="Search videos...">

<div id="homeThumbnails"></div>

</div>

<!-- PROFILE -->
<div id="profileSection" style="display:none;padding:20px;">

Username: <b id="profileUsername"></b><br><br>

Bio:<br>
<textarea id="bio" rows="5" cols="40"></textarea><br>

<input type="button" value="Save Bio" id="saveBioBtn"><br><br>

<h3>Upload Video</h3>

Title:<br>
<input id="videoTitle"><br>

URL:<br>
<input id="videoURL"><br>

<input type="button" value="Post Video" id="postVideoBtn">

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore,doc,setDoc,getDoc,collection,getDocs,addDoc,query,orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyC2QdW6Gq3dnFf2JL4-vET-68M6LvTJUvw",
authDomain:"classtube2-1436a.firebaseapp.com",
projectId:"classtube2-1436a",
storageBucket:"classtube2-1436a.firebasestorage.app",
messagingSenderId:"290016676161",
appId:"1:290016676161:web:1f88361dcb31ad31fd79c0"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let allVideos=[];

const avatarColors=[
"#AA47BD","#7B1FA2","#0388D2","#0098A7",
"#68A039","#EF6C00","#EC417A","#5D6AC0",
"#004D40","#34691E","#8C6E63","#512DA7"
];

function getAvatarColor(name){
let hash=0;
for(let i=0;i<name.length;i++){
hash=name.charCodeAt(i)+((hash<<5)-hash);
}
return avatarColors[Math.abs(hash)%avatarColors.length];
}

function showSection(section){

loginSection.style.display="none";
feedSection.style.display="none";
profileSection.style.display="none";

if(section==="login") loginSection.style.display="block";
if(section==="feed") feedSection.style.display="block";
if(section==="profile") profileSection.style.display="block";

}

signupBtn.onclick=async()=>{

const username=signupUsername.value.trim();
const email=signupEmail.value.trim();
const password=signupPassword.value;

const cred=await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db,"users",cred.user.uid),{
username,
bio:""
});

};

loginBtn.onclick=async()=>{
await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
};

logoutBtn.onclick=()=>signOut(auth);

onAuthStateChanged(auth,async(user)=>{

if(!user){
showSection("login");
return;
}

headerLinks.style.display="inline";

userEmail.innerText=user.email;

showSection("feed");

await loadUsers();
await loadVideos();

});

async function loadUsers(){

const snapshot=await getDocs(collection(db,"users"));

let html="<table border='1'><tr><th>Avatar</th><th>Username</th><th>Bio</th></tr>";

snapshot.forEach(docu=>{

const d=docu.data();
const color=getAvatarColor(d.username);

html+=`
<tr>
<td><div class="avatar" style="background:${color}">${d.username.charAt(0)}</div></td>
<td>${d.username}</td>
<td>${d.bio||""}</td>
</tr>
`;

});

html+="</table>";

userList.innerHTML=html;

}

async function loadVideos(){

const q=query(collection(db,"videos"),orderBy("createdAt","desc"));
const snap=await getDocs(q);

allVideos=[];

snap.forEach(doc=>{
allVideos.push({id:doc.id,...doc.data()});
});

renderVideos(allVideos);

}

function renderVideos(videos){

let html="";

videos.forEach(v=>{

html+=`
<div onclick="window.playVideo('${v.id}')">
<iframe src="${v.url.replace('/view','/preview')}" frameborder="0"></iframe>
<div class="videoTitle">${v.title}</div>
</div>
`;

});

homeThumbnails.innerHTML=html;

}

searchBox.oninput=()=>{

const term=searchBox.value.toLowerCase();

const filtered=allVideos.filter(v=>
v.title.toLowerCase().includes(term)
);

renderVideos(filtered);

};

postVideoBtn.onclick=async()=>{

await addDoc(collection(db,"videos"),{
title:videoTitle.value,
url:videoURL.value,
createdAt:new Date()
});

videoTitle.value="";
videoURL.value="";

loadVideos();

};

homeBtn.onclick=()=>showSection("feed");

myProfileBtn.onclick=()=>showSection("profile");

</script>

</body>
</html>
