<!DOCTYPE html>
<html>
<head>
<title>ClassTube</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#fff; }
.avatar {
    width:30px; height:30px; border-radius:50%;
    color:white; display:flex; justify-content:center; align-items:center;
    font-weight:bold; font-family:Arial,sans-serif;
    text-transform:none; cursor:pointer; text-decoration:none;
}
.videoTitle { cursor:pointer; color:blue; font-weight:500; margin:3px 0; }
.videoTitle.clicked { color:black; }
.videoMeta { color:grey; font-size:12px; margin-bottom:5px; }
#videoPlayerWrapper { display:flex; gap:20px; }
#videoPlayerMain { flex:2; }
#otherVideos { flex:1; display:flex; flex-direction:column; gap:10px; overflow-y:auto; padding-top:5px; }
#otherVideos div { cursor:pointer; display:flex; flex-direction:column; }
#homeThumbnails { display:flex; flex-wrap:wrap; gap:10px; padding-top:5px; margin-bottom:15px; }
#homeThumbnails div { cursor:pointer; display:flex; flex-direction:column; width:160px; }
#homeThumbnails iframe { width:160px; height:90px; }
.channelHeader { font-weight:bold; margin-bottom:5px; }
.channelBio { font-style:italic; margin-bottom:15px; }
#searchBar { margin-bottom:10px; width:300px; padding:5px; font-size:14px; }
.userSearchResults { margin-bottom:10px; }
.userSearchResults div { display:flex; align-items:center; gap:8px; margin-bottom:3px; cursor:pointer; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="userProfile" style="position:absolute; top:10px; right:15px; display:flex; align-items:center; gap:8px;">
<img id="userAvatar" src="" style="width:34px; height:34px; border-radius:50%; display:none;">
<span id="usernameDisplay" style="font-weight:500;"></span>
</div>

<table width="100%" border="1">
<tr>
<td>
<b>ClassTube</b>
<span id="headerLinks" style="float:right; display:none;">
<a href="#" id="homeBtn">Home</a> |
<a href="#" id="myProfileBtn">My Profile</a> |
<a href="#" id="logoutBtn">Logout</a>
</span>
</td>
</tr>
</table>

<!-- LOGIN -->
<div id="loginSection" style="width:300px; margin:50px auto; background:#DDD; padding:10px; border:1px solid #999;">
<h2>Login / Sign Up</h2>

<b>Sign Up</b><br><br>
Username:<br><input type="text" id="signupUsername"><br><br>
Email:<br><input type="email" id="signupEmail"><br><br>
Birthdate:<br><input type="date" id="signupBirthdate"><br><br>
Password:<br><input type="password" id="signupPassword"><br><br>
<input type="button" value="Create Account" id="signupBtn"><br><br>

<b>Login</b><br><br>
Email:<br><input type="email" id="loginEmail"><br><br>
Password:<br><input type="password" id="loginPassword"><br><br>
<input type="button" value="Login" id="loginBtn"><br><br>

<span id="status"></span>
</div>

<!-- FEED -->
<div id="feedSection" style="display:none; padding:20px;">
<h3>Welcome, <span id="userEmail"></span></h3>
<hr>

<h3>Search Videos / Users:</h3>
<input type="text" id="searchBar" placeholder="Search by title or user...">

<div class="userSearchResults" id="userSearchResults" style="display:none;"></div>

<h3>Students:</h3>
<div id="userList"></div>

<h3>All Videos:</h3>
<div id="homeThumbnails"></div>
</div>

<!-- PROFILE -->
<div id="profileSection" style="display:none; padding:20px;">
Username: <b id="profileUsername"></b><br>
Join date: <span id="profileJoinDate"></span><br><br>
Bio:<br>
<textarea id="bio" rows="5" cols="40"></textarea><br>
<input type="button" value="Save Bio" id="saveBioBtn"><br>
<div id="profileStatus"></div><br><br>

<h3>My Videos</h3>
<div id="userVideos"></div>

<h3>Upload Video</h3>
Title:<br><input type="text" id="videoTitle"><br>
Video URL:<br><input type="text" id="videoURL"><br>
<input type="button" value="Post Video" id="postVideoBtn"><br>
</div>

<!-- VIDEO PLAYER -->
<div id="videoPlayerSection" style="display:none; padding:20px;">
<div id="videoPlayerWrapper">
<div id="videoPlayerMain">
<h3 id="playerTitle" class="videoTitle"></h3>
<div id="playerUploader" style="display:flex; align-items:center; gap:8px;"></div>
<iframe id="playerIframe" width="560" height="315" src="" frameborder="0" allowfullscreen></iframe>
<div id="playerStats" class="videoMeta"></div>
</div>
<div id="otherVideos"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, getDocs, addDoc, query, orderBy, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyC2QdW6Gq3dnFf2JL4-vET-68M6LvTJUvw",
  authDomain:"classtube2-1436a.firebaseapp.com",
  projectId:"classtube2-1436a",
  storageBucket:"classtube2-1436a.firebasestorage.app",
  messagingSenderId:"290016676161",
  appId:"1:290016676161:web:1f88361dcb31ad31fd79c0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;

const avatarColors = ["#AA47BD","#7B1FA2","#77919D","#455A65","#EC417A","#C1175C","#5D6AC0","#0388D2","#00579B","#0098A7","#00897B","#004D40","#68A039","#34691E","#8C6E63","#5D4138","#7D57C1","#512DA7","#EF6C00","#F6511E","#BE360B"];
function getAvatarColor(name){ let hash=0; for(let i=0;i<name.length;i++){hash=name.charCodeAt(i)+((hash<<5)-hash);} return avatarColors[Math.abs(hash)%avatarColors.length]; }

// SIGNUP/LOGIN
document.getElementById('signupBtn').onclick = async ()=>{
  const username = document.getElementById('signupUsername').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  if(!username){ status.innerText="Username required"; return; }
  try{
    const userCred = await createUserWithEmailAndPassword(auth,email,password);
    await setDoc(doc(db,"users",userCred.user.uid),{ username,email,bio:"",createdAt:new Date() });
    document.getElementById('signupUsername').value="";
    document.getElementById('signupEmail').value="";
    document.getElementById('signupPassword').value="";
    status.innerText="Account created!";
  }catch(err){ status.innerText=err.message; }
};

document.getElementById('loginBtn').onclick = async ()=>{
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  try{ await signInWithEmailAndPassword(auth,email,password); } 
  catch(err){ status.innerText=err.message; }
};

const status = document.getElementById('status');
const headerLinks = document.getElementById('headerLinks');
const userEmail = document.getElementById('userEmail');

// DATA
let allUsers=[], allVideos=[];

// SHOW SECTIONS
function showSection(section){
  document.getElementById("loginSection").style.display = (section==="login")?"block":"none";
  document.getElementById("feedSection").style.display = (section==="feed")?"block":"none";
  document.getElementById("profileSection").style.display = (section==="profile")?"block":"none";
  document.getElementById("videoPlayerSection").style.display = (section==="player")?"block":"none";
}

// LOAD USERS/VIDEOS
async function loadUsers(){
  const snapshot = await getDocs(collection(db,"users"));
  allUsers=[];
  let html="<table border='1' cellpadding='5'><tr><th>Avatar</th><th>Username</th><th>Bio</th></tr>";
  snapshot.forEach(doc=>{
    const data=doc.data();
    allUsers.push({username:data.username,bio:data.bio||""});
    const color=getAvatarColor(data.username);
    html+=`<tr>
      <td><div class='avatar' style='background:${color}' data-username='${data.username}'></div></td>
      <td data-username='${data.username}'>${data.username}</td>
      <td>${data.bio||""}</td>
    </tr>`;
  });
  html+="</table>";
  document.getElementById('userList').innerHTML=html;

  // Bind click listeners dynamically
  document.querySelectorAll('#userList [data-username]').forEach(el=>{
    el.addEventListener('click',()=>showUserChannel(el.dataset.username));
  });
}

async function loadVideos(){
  const q=query(collection(db,"videos"),orderBy("createdAt","desc"));
  const snapshot = await getDocs(q);
  allVideos=[];
  let html="";
  snapshot.forEach(doc=>{
    const data=doc.data();
    allVideos.push({id:doc.id,title:data.title,url:data.url,user:data.user});
    html+=`<div data-videoid='${doc.id}'><iframe src="${data.url.replace("/view","/preview")}" frameborder="0" width="160" height="90"></iframe>
      <div class="videoTitle">${data.title}</div></div>`;
  });
  document.getElementById('homeThumbnails').innerHTML=html;

  document.querySelectorAll('#homeThumbnails [data-videoid]').forEach(el=>{
    el.addEventListener('click',()=>playVideo(el.dataset.videoid));
  });
}

// SEARCH
const searchInput=document.getElementById('searchBar');
const userResultsDiv=document.getElementById('userSearchResults');
searchInput.addEventListener('input',function(){
  const queryStr=this.value.toLowerCase().trim();
  const userTable=document.getElementById('userList');
  if(queryStr===""){
    userResultsDiv.style.display="none";
    userTable.style.display="block";
    loadVideos();
    return;
  }
  userTable.style.display="none";
  userResultsDiv.style.display="block";

  // Users
  userResultsDiv.innerHTML="";
  allUsers.forEach(u=>{
    if(u.username.toLowerCase().includes(queryStr)){
      const div=document.createElement('div');
      div.className='searchUser';
      div.innerHTML=`<div class='avatar' style='background:${getAvatarColor(u.username)}'>${u.username.charAt(0)}</div><span>${u.username}</span>`;
      div.addEventListener('click',()=>showUserChannel(u.username));
      userResultsDiv.appendChild(div);
    }
  });

  // Videos
  const homeThumbs=document.getElementById('homeThumbnails');
  homeThumbs.innerHTML="";
  allVideos.forEach(v=>{
    if(v.title.toLowerCase().includes(queryStr)){
      const div=document.createElement('div');
      div.innerHTML=`<iframe src="${v.url.replace("/view","/preview")}" frameborder="0" width="160" height="90"></iframe>
        <div class="videoTitle">${v.title}</div>`;
      div.addEventListener('click',()=>playVideo(v.id));
      homeThumbs.appendChild(div);
    }
  });
});

// BUTTONS
document.getElementById("homeBtn").onclick = ()=>{ showSection('feed'); loadVideos(); loadUsers(); };
document.getElementById("myProfileBtn").onclick = ()=>loadProfile();
document.getElementById("logoutBtn").onclick = async ()=>await signOut(auth);

// USER CHANNEL
async function showUserChannel(username){
  showSection('feed');
  document.getElementById('userList').style.display='none';
  document.getElementById('userSearchResults').style.display='none';
  const snapshotVideos = await getDocs(collection(db,"videos"));
  const homeThumbs=document.getElementById('homeThumbnails');
  homeThumbs.innerHTML="";
  const userSnap = await getDocs(collection(db,"users"));
  let bio="";
  userSnap.forEach(d=>{if(d.data().username===username) bio=d.data().bio||"";});
  const header=document.createElement('div'); header.className='channelHeader'; header.innerText=username+"'s channel";
  const bioDiv=document.createElement('div'); bioDiv.className='channelBio'; bioDiv.innerText=bio;
  homeThumbs.appendChild(header); homeThumbs.appendChild(bioDiv);
  snapshotVideos.forEach(doc=>{
    const v=doc.data();
    if(v.user===username){
      const div=document.createElement('div');
      div.innerHTML=`<iframe src="${v.url.replace("/view","/preview")}" frameborder="0" width="160" height="90"></iframe>
        <div class="videoTitle">${v.title}</div>`;
      div.addEventListener('click',()=>playVideo(doc.id));
      homeThumbs.appendChild(div);
    }
  });
}

// PLAY VIDEO
async function playVideo(videoId){
  showSection('player');
  const docSnap = await getDoc(doc(db,"videos",videoId));
  if(!docSnap.exists()) return;
  const data = docSnap.data();
  document.getElementById('playerTitle').innerText = data.title;
  const uploaderColor=getAvatarColor(data.user);
  const uploaderDiv=document.getElementById('playerUploader');
  uploaderDiv.innerHTML="";
  const avatar=document.createElement('div');
  avatar.className='avatar';
  avatar.style.background=uploaderColor;
  avatar.innerText=data.user.charAt(0);
  avatar.addEventListener('click',()=>showUserChannel(data.user));
  const span=document.createElement('span');
  span.innerText=data.user;
  span.style.cursor='pointer';
  span.addEventListener('click',()=>showUserChannel(data.user));
  uploaderDiv.appendChild(avatar); uploaderDiv.appendChild(span);
  document.getElementById('playerIframe').src=data.url.replace("/view","/preview");
  const createdAt=data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt.seconds*1000);
  const diffMs=new Date()-createdAt;
  const diffDays=Math.floor(diffMs/(1000*60*60*24));
  let agoText=diffDays<30 ? diffDays+" days ago" : Math.floor(diffDays/30)+" months ago";
  document.getElementById('playerStats').innerText=(data.views||0)+" views • "+agoText;

  // other videos
  const q=query(collection(db,"videos"),orderBy("createdAt","desc"));
  const snapshot = await getDocs(q);
  const otherDiv=document.getElementById('otherVideos');
  otherDiv.innerHTML="";
  snapshot.forEach(d=>{
    if(d.id===videoId) return;
    const v=d.data();
    const div=document.createElement('div');
    div.innerHTML=`<div>${v.title}</div><iframe width="140" height="80" src="${v.url.replace("/view","/preview")}" frameborder="0"></iframe>`;
    div.addEventListener('click',()=>playVideo(d.id));
    otherDiv.appendChild(div);
  });
}

// INITIAL AUTH
onAuthStateChanged(auth, async user=>{
  if(!user){ showSection("login"); headerLinks.style.display="none"; status.innerText="You must log in."; }
  else{
    currentUser=user; showSection("feed"); headerLinks.style.display="inline"; userEmail.innerText=user.email;
    const userSnap = await getDoc(doc(db,"users",user.uid));
    if(userSnap.exists()) currentUser.username=userSnap.data().username;
    await loadUsers(); await loadVideos(); await loadProfile(); await loadUserVideos();
  }
});

// PROFILE / UPLOAD (unchanged)
async function loadProfile() {
    showSection('profile');
    const docSnap = await getDoc(doc(db, "users",currentUser.uid));
    if (docSnap.exists()) {
        document.getElementById('profileUsername').innerText = docSnap.data().username;
        const createdAt = docSnap.data().createdAt.toDate ? docSnap.data().createdAt.toDate() : new Date(docSnap.data().createdAt.seconds*1000);
        document.getElementById('profileJoinDate').innerText = createdAt.toDateString();
        document.getElementById('bio').value = docSnap.data().bio || "";
    }
}
document.getElementById('saveBioBtn').onclick = async () => {
    const bio = document.getElementById('bio').value.trim();
    try { await updateDoc(doc(db,"users",currentUser.uid),{bio}); document.getElementById('profileStatus').innerText="Bio saved!"; }
    catch(err){ document.getElementById('profileStatus').innerText="Error saving bio: "+err.message; }
}
document.getElementById('postVideoBtn').onclick = async ()=>{
  const title=document.getElementById('videoTitle').value.trim();
  const url=document.getElementById('videoURL').value.trim();
  if(!title||!url){ alert("Title and URL required"); return; }
  await addDoc(collection(db,"videos"),{ title,url,user:currentUser.username,userId:currentUser.uid,createdAt:new Date(),views:0 });
  document.getElementById('videoTitle').value=""; document.getElementById('videoURL').value="";
  await loadVideos(); alert("Video uploaded!");
}
async function loadUserVideos(){
  const snapshot = await getDocs(collection(db,"videos"));
  let html="";
  snapshot.forEach(doc=>{
    const data=doc.data();
    if(data.user===currentUser.username){
      const div=document.createElement('div');
      div.className="videoTitle";
      div.innerText=data.title;
      div.addEventListener('click',()=>playVideo(doc.id));
      document.getElementById('userVideos').appendChild(div);
    }
  });
}

// Initial view
showSection("login");
</script>

</body>
</html>
