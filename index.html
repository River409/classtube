<!DOCTYPE html>

<html>
<head>
<title>ClassTube</title>

<style>

body{
font-family:Arial;
margin:0;
}

.videoCard{
border-bottom:1px solid #ccc;
padding:10px;
display:flex;
gap:10px;
}

.videoTitle{
color:#065fd4;
font-weight:bold;
cursor:pointer;
text-decoration:none;
}

.videoTitle:hover{
text-decoration:underline;
}

.watchPage{
display:flex;
gap:20px;
}

.mainVideo{
width:70%;
}

.sideVideos{
width:30%;
}

.sideVideo{
display:flex;
gap:8px;
margin-bottom:10px;
cursor:pointer;
}

.sideVideoTitle{
color:#065fd4;
font-size:14px;
}

</style>

</head>

<body>

<table width="100%" border="1">
<tr>
<td>

<b>ClassTube</b>

<span id="headerLinks" style="float:right;display:none">

<a href="#" id="homeBtn">Home</a> | <a href="#" id="myProfileBtn">My Profile</a> | <a href="#" id="logoutBtn">Logout</a>

</span>

</td>
</tr>
</table>

<div id="loginSection" style="width:300px;margin:50px auto;background:#DDD;padding:10px;border:1px solid #999">

<h2>Login / Sign Up</h2>

<b>Sign Up</b><br><br>

Username:<br> <input id="signupUsername"><br><br>

Email:<br> <input id="signupEmail"><br><br>

Password:<br> <input type="password" id="signupPassword"><br><br>

<input type="button" value="Create Account" id="signupBtn"><br><br>

<b>Login</b><br><br>

Email:<br> <input id="loginEmail"><br><br>

Password:<br> <input type="password" id="loginPassword"><br><br>

<input type="button" value="Login" id="loginBtn"><br><br>

<span id="status"></span>

</div>

<div id="feedSection" style="display:none;padding:20px">

<h3>Welcome, <span id="userEmail"></span></h3>

<hr>

<h3>Students</h3>

<div id="userList"></div>

<hr>

<div id="videoList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, getDocs, addDoc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyC2QdW6Gq3dnFf2JL4-vET-68M6LvTJUvw",
authDomain:"classtube2-1436a.firebaseapp.com",
projectId:"classtube2-1436a",
storageBucket:"classtube2-1436a.firebasestorage.app",
messagingSenderId:"290016676161",
appId:"1:290016676161:web:1f88361dcb31ad31fd79c0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let videosCache=[];


// LOGIN STATE

onAuthStateChanged(auth, async (user)=>{

if(!user){

document.getElementById("loginSection").style.display="block";
document.getElementById("feedSection").style.display="none";

}else{

document.getElementById("loginSection").style.display="none";
document.getElementById("feedSection").style.display="block";

document.getElementById("headerLinks").style.display="inline";
document.getElementById("userEmail").innerText=user.email;

loadUsers();
loadVideos();

}

});


// SIGNUP

signupBtn.onclick=async()=>{

const username=signupUsername.value;
const email=signupEmail.value;
const password=signupPassword.value;

const user=await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db,"users",user.user.uid),{
username,
email,
bio:"",
createdAt:new Date()
});

};


// LOGIN

loginBtn.onclick=async()=>{

await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);

};


// USERS

async function loadUsers(){

const snapshot=await getDocs(collection(db,"users"));

let html="<ul>";

snapshot.forEach(docSnap=>{

const data=docSnap.data();

html+=`<li>${data.username}</li>`;

});

html+="</ul>";

userList.innerHTML=html;

}


// LOAD VIDEOS

async function loadVideos(){

const q=query(collection(db,"videos"),orderBy("createdAt","desc"));

const snapshot=await getDocs(q);

videosCache=[];

let html="";

snapshot.forEach(docSnap=>{

const data=docSnap.data();
const id=docSnap.id;

let url=data.url;

if(url.includes("/view")){
url=url.replace("/view","/preview");
}

videosCache.push({
id,
title:data.title,
user:data.user,
url
});

html+=`

<div class="videoCard">

<iframe src="${url}" width="160" height="90"></iframe>

<div>

<a class="videoTitle" onclick="watchVideo('${id}')">${data.title}</a>

<br>

${data.user}

</div>

</div>

`;

});

videoList.innerHTML=html;

}


// WATCH PAGE

window.watchVideo=function(id){

const video=videosCache.find(v=>v.id===id);

let side="";

videosCache.forEach(v=>{

if(v.id!==id){

side+=`

<div class="sideVideo" onclick="watchVideo('${v.id}')">

<iframe src="${v.url}" width="120" height="70"></iframe>

<div class="sideVideoTitle">${v.title}</div>

</div>

`;

}

});

videoList.innerHTML=`

<div class="watchPage">

<div class="mainVideo">

<h2>${video.title}</h2>

<iframe src="${video.url}" width="640" height="360"></iframe>

<p>Uploaded by ${video.user}</p>

</div>

<div class="sideVideos">

${side}

</div>

</div>

`;

};

</script>

</body>
</html>
