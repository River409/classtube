<!DOCTYPE html>
<html>
<head>
<title>ClassTube</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#fff; }
.avatar {
    width:30px; height:30px; border-radius:0;
    border:1px solid #888;
    cursor:pointer;
    background-size:cover;
    background-position:center;
}
.videoTitle { cursor:pointer; color:blue; margin:3px 0; }
.videoMeta { color:grey; font-size:12px; }
#videoPlayerWrapper { display:flex; gap:20px; }
#videoPlayerMain { flex:2; }
#otherVideos { flex:1; display:flex; flex-direction:column; gap:10px; }
#homeThumbnails { display:flex; flex-wrap:wrap; gap:10px; }
#homeThumbnails div { cursor:pointer; width:160px; }
.tabButtons button { margin-right:5px; }
</style>
</head>
<body>

<table width="100%" border="1">
<tr>
<td>
<b>ClassTube</b>
<span id="headerLinks" style="float:right; display:none;">
<a href="#" id="homeBtn">Home</a> |
<a href="#" id="myProfileBtn">My Profile</a> |
<a href="#" id="logoutBtn">Logout</a>
</span>
</td>
</tr>
</table>

<div id="loginSection">
Email:<input id="loginEmail"><br>
Password:<input id="loginPassword"><br>
<button id="loginBtn">Login</button>
<br><br>
Signup Email:<input id="signupEmail"><br>
Username:<input id="signupUsername"><br>
Password:<input id="signupPassword"><br>
<button id="signupBtn">Signup</button>
<br><span id="status"></span>
</div>

<div id="feedSection" style="display:none;">
<div class="tabButtons">
<button id="videosTab">Videos</button>
<button id="peopleTab">People</button>
</div>

<div id="videosSection">
<div id="homeThumbnails"></div>
</div>

<div id="peopleSection" style="display:none;">
<div id="userList"></div>
</div>
</div>

<div id="profileSection" style="display:none;">
<b id="profileUsername"></b><br>
<span id="profileJoinDate"></span><br>

<textarea id="bio"></textarea><br>
<button id="saveBioBtn">Save Bio</button>

<div id="userVideos"></div>

<div id="uploadSection">
<input id="videoTitle" placeholder="Title"><br>
<input id="videoURL" placeholder="Drive URL"><br>
<button id="postVideoBtn">Post Video</button>
</div>
</div>

<div id="videoPlayerSection" style="display:none;">
<div id="videoPlayerWrapper">
<div id="videoPlayerMain">
<h3 id="playerTitle"></h3>
<div id="playerUploader"></div>
<iframe id="playerIframe" width="560" height="315"></iframe>
<div id="playerStats"></div>
</div>
<div id="otherVideos"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, getDocs, addDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = { /* YOUR CONFIG */ };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;
const defaultAvatar="https://i.redd.it/high-resolution-remakes-of-the-old-default-youtube-avatar-v0-bgwxf7bec4ob1.png";

function showSection(s){
loginSection.style.display=s==="login"?"block":"none";
feedSection.style.display=s==="feed"?"block":"none";
profileSection.style.display=s==="profile"?"block":"none";
videoPlayerSection.style.display=s==="player"?"block":"none";
}

onAuthStateChanged(auth,async user=>{
if(!user){showSection("login");return;}
currentUser=user;
showSection("feed");
await loadVideos();
await loadUsers();
});

signupBtn.onclick=async()=>{
const email=signupEmail.value;
const pass=signupPassword.value;
const username=signupUsername.value;
const u=await createUserWithEmailAndPassword(auth,email,pass);
await setDoc(doc(db,"users",u.user.uid),{username,bio:"",createdAt:new Date()});
};

loginBtn.onclick=async()=>{
await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
};

logoutBtn.onclick=()=>signOut(auth);

homeBtn.onclick=()=>{showSection("feed");loadVideos();};
myProfileBtn.onclick=()=>loadProfile();

async function loadVideos(){
const snap=await getDocs(collection(db,"videos"));
let vids=[];
snap.forEach(d=>vids.push({id:d.id,...d.data()}));

vids.sort(()=>Math.random()-0.5);
vids=vids.slice(0,25);

homeThumbnails.innerHTML=vids.map(v=>`
<div onclick="playVideo('${v.id}')">
<iframe src="${v.url.replace("/view","/preview")}"></iframe>
<div>${v.title}</div>
</div>`).join("");
}

window.playVideo=async(id)=>{
showSection("player");
const d=await getDoc(doc(db,"videos",id));
const v=d.data();

playerTitle.innerText=v.title;
playerIframe.src=v.url.replace("/view","/preview");

playerUploader.innerHTML=`
<div onclick="showUserByName('${v.user}')" style="cursor:pointer;display:flex;gap:5px;">
<div class="avatar" style="background-image:url(${defaultAvatar})"></div>
${v.user}
</div>`;

const snap=await getDocs(collection(db,"videos"));
let vids=[];
snap.forEach(d=>{
if(d.id!==id) vids.push({id:d.id,...d.data()});
});
vids.sort(()=>Math.random()-0.5);
vids=vids.slice(0,6);

otherVideos.innerHTML=vids.map(v=>`
<div onclick="playVideo('${v.id}')">
${v.title}
<iframe src="${v.url.replace("/view","/preview")}" width="140"></iframe>
</div>`).join("");
};

window.showUserByName=async(name)=>{
const snap=await getDocs(collection(db,"users"));
snap.forEach(d=>{
if(d.data().username===name) showUserProfile(d.id);
});
};

window.showUserProfile=async(uid)=>{
showSection("profile");
const d=await getDoc(doc(db,"users",uid));
const u=d.data();

profileUsername.innerText=u.username;
bio.value=u.bio||"";

if(uid!==currentUser.uid){
bio.readOnly=true;
uploadSection.style.display="none";
saveBioBtn.style.display="none";
}else{
bio.readOnly=false;
uploadSection.style.display="block";
saveBioBtn.style.display="block";
}

const snap=await getDocs(collection(db,"videos"));
userVideos.innerHTML="";
snap.forEach(doc=>{
const v=doc.data();
if(v.user===u.username){
userVideos.innerHTML+=`<div onclick="playVideo('${doc.id}')">${v.title}</div>`;
}
});
};

async function loadUsers(){
const snap=await getDocs(collection(db,"users"));
userList.innerHTML=snap.docs.map(d=>`
<div onclick="showUserProfile('${d.id}')">${d.data().username}</div>
`).join("");
}

async function loadProfile(){
showUserProfile(currentUser.uid);
}

postVideoBtn.onclick=async()=>{
await addDoc(collection(db,"videos"),{
title:videoTitle.value,
url:videoURL.value,
user:currentUser.email,
createdAt:new Date()
});
loadVideos();
};

saveBioBtn.onclick=async()=>{
await updateDoc(doc(db,"users",currentUser.uid),{bio:bio.value});
};

showSection("login");
</script>
</body>
</html>
