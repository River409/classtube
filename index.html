<!DOCTYPE html>
<html>
<head>
<title>ClassTube</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#fff; }
.avatar {
    width:40px; height:40px; border:1px solid #888;
    background-size:cover; background-position:center;
    display:flex; justify-content:center; align-items:center;
    font-weight:bold; color:white;
}
#peopleTable img { width:40px; height:40px; border-radius:0; border:1px solid #888; } /* square avatars with outline */
.videoTitle { cursor:pointer; color:blue; font-weight:500; margin:3px 0; }
.videoMeta { color:grey; font-size:12px; margin-bottom:5px; }
#videoPlayerWrapper { display:flex; gap:20px; }
#videoPlayerMain { flex:2; }
#otherVideos { flex:1; display:flex; flex-direction:column; gap:10px; overflow-y:auto; }
#homeThumbnails { display:flex; flex-wrap:wrap; gap:10px; }
#homeThumbnails div { cursor:pointer; width:160px; }
#commentsList { max-height:200px; overflow-y:auto; margin-bottom:5px; border:1px solid #ccc; padding:5px; }
#commentInput { width:80%; margin-bottom:5px; }
#profileSection { display:none; padding:20px; border:1px solid #ccc; margin-top:20px; }
#signupSection, #loginSection { width:300px; margin:20px auto; background:#DDD; padding:10px; }
#signupSection { margin-top:30px; }
.input-group { margin-bottom:10px; display:flex; flex-direction:column; }
.tabBtn { padding:5px 10px; font-size:14px; margin-right:5px; cursor:pointer; }
#saveBioBtn { padding:5px 10px; font-size:12px; cursor:pointer; }
#bioInput { width:200px; height:50px; }
#peopleTable { width:100%; border-collapse:collapse; margin-top:10px; }
#peopleTable th, #peopleTable td { border:1px solid #ccc; padding:5px; text-align:left; }
a { cursor:pointer; color:blue; text-decoration:underline; }
</style>
</head>
<body>

<div id="userProfile" style="position:absolute; top:10px; right:15px;">
<span id="usernameDisplay"></span>
</div>

<table width="100%" border="1">
<tr>
<td>
<b>ClassTube</b>
<span id="headerLinks" style="float:right; display:none;">
<a href="#" id="homeBtn">Home</a> |
<a href="#" id="myProfileBtn">My Profile</a> |
<a href="#" id="logoutBtn">Logout</a>
</span>
</td>
</tr>
</table>

<!-- LOGIN -->
<div id="loginSection">
<h2>Login</h2>
<div class="input-group"><label>Email:</label><input id="loginEmail" placeholder="Email"></div>
<div class="input-group"><label>Password:</label><input id="loginPassword" type="password" placeholder="Password"></div>
<button id="loginBtn">Login</button>
</div>

<!-- SIGNUP -->
<div id="signupSection">
<h2>Sign Up</h2>
<div class="input-group"><label>Username:</label><input id="signupUsername" placeholder="Username"></div>
<div class="input-group"><label>Email:</label><input id="signupEmail" placeholder="Email"></div>
<div class="input-group"><label>Password:</label><input id="signupPassword" type="password" placeholder="Password"></div>
<div class="input-group"><label>Birthdate:</label><input id="signupBirthdate" type="date"></div>
<button id="signupBtn">Create Account</button>
</div>

<div id="status"></div>

<div id="feedSection" style="display:none; padding:20px;">
<h3>Welcome, <span id="userEmail"></span></h3>

<button class="tabBtn" id="videosTab">Videos</button>
<button class="tabBtn" id="peopleTab">People</button>

<div id="videosSection">
<h3>Videos</h3>
<div id="homeThumbnails"></div>
</div>

<div id="peopleSection" style="display:none;">
<h3>People</h3>
<table id="peopleTable">
<thead>
<tr><th>Avatar</th><th>Username</th><th>Channel</th><th>Join Date</th></tr>
</thead>
<tbody id="userList"></tbody>
</table>
</div>
</div>

<div id="profileSection">
<h3>Profile</h3>
<p id="profileInfo"></p>
<div class="input-group">
<label>Bio:</label>
<textarea id="bioInput" rows="3"></textarea>
<button id="saveBioBtn">Save Bio</button>
</div>
<div id="channelVideos"></div>
</div>

<div id="videoPlayerSection" style="display:none; padding:20px;">
<div id="videoPlayerWrapper">
<div id="videoPlayerMain">
<h3 id="playerTitle"></h3>
<iframe id="playerIframe" width="560" height="315"></iframe>

<h4>Comments</h4>
<div id="commentsList"></div>
<input id="commentInput" placeholder="Write a comment">
<button id="commentBtn">Post</button>

</div>
<div id="otherVideos"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyC2QdW6Gq3dnFf2JL4-vET-68M6LvTJUvw",
  authDomain:"classtube2-1436a.firebaseapp.com",
  projectId:"classtube2-1436a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;
let currentVideoId=null;
const HOME_LIMIT=25, SIDE_LIMIT=6;
const defaultAvatar="https://i.redd.it/high-resolution-remakes-of-the-old-default-youtube-avatar-v0-bgwxf7bec4ob1.png";

// AUTH
signupBtn.onclick = async ()=>{
  const user = await createUserWithEmailAndPassword(auth, signupEmail.value, signupPassword.value);
  await setDoc(doc(db,"users",user.user.uid),{
    username:signupUsername.value,
    birthdate:signupBirthdate.value
  });
};

loginBtn.onclick = ()=>signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
logoutBtn.onclick = ()=>signOut(auth);

// STATE
onAuthStateChanged(auth, async user=>{
  if(!user){
    loginSection.style.display="block";
    signupSection.style.display="block";
    feedSection.style.display="none";
    profileSection.style.display="none";
    return;
  }

  currentUser=user;
  loginSection.style.display="none";
  signupSection.style.display="none";
  feedSection.style.display="block";
  profileSection.style.display="block";
  headerLinks.style.display="inline";
  userEmail.innerText=user.email;

  loadVideos();
  loadUserList();
  loadProfile();
});

// LOAD VIDEOS
async function loadVideos(){
  const q=query(collection(db,"videos"),orderBy("createdAt","desc"));
  const snap=await getDocs(q);
  let html="",count=0;
  snap.forEach(docSnap=>{
    if(count>=HOME_LIMIT)return;
    let v=docSnap.data();
    if(v.url.includes("drive.google.com")) v.url=v.url.replace("-view","-preview");
    html+=`<div onclick="playVideo('${docSnap.id}')">
      <iframe src="${v.url}" width="160" height="90"></iframe>
      <div class="videoTitle">${v.title}</div>
      <div class="videoMeta">${v.views||0} views</div>
    </div>`;
    count++;
  });
  homeThumbnails.innerHTML=html;
}

// PLAY VIDEO
window.playVideo=async(id)=>{
  currentVideoId=id;
  videoPlayerSection.style.display="block";
  feedSection.style.display="none";

  const ref=doc(db,"videos",id);
  const snap=await getDoc(ref);
  let v=snap.data();
  if(v.url.includes("drive.google.com")) v.url=v.url.replace("-view","-preview");

  await updateDoc(ref,{views:(v.views||0)+1});
  playerTitle.innerText=v.title;
  playerIframe.src=v.url;

  loadComments();

  const all=await getDocs(collection(db,"videos"));
  let html="",count=0;
  all.forEach(d=>{
    if(d.id===id)return;
    if(count>=SIDE_LIMIT)return;
    let vid=d.data();
    html+=`<div onclick="playVideo('${d.id}')">${vid.title}</div>`;
    count++;
  });
  otherVideos.innerHTML=html;
};

// LOAD COMMENTS
async function loadComments(){
  const snap=await getDocs(collection(db,"comments"));
  let html="";
  snap.forEach(d=>{
    let c=d.data();
    if(c.videoId===currentVideoId) html+=`<div><b>${c.user}</b>: ${c.text}</div>`;
  });
  commentsList.innerHTML=html;
}

// POST COMMENT
commentBtn.onclick=async ()=>{
  if(!commentInput.value) return;
  await addDoc(collection(db,"comments"),{
    videoId:currentVideoId,
    text:commentInput.value,
    user:currentUser.email,
    createdAt:Date.now()
  });
  commentInput.value="";
  loadComments();
};

// NAVIGATION
homeBtn.onclick=()=>{
  videoPlayerSection.style.display="none";
  feedSection.style.display="block";
  loadVideos();
};
videosTab.onclick=()=>{
  videosSection.style.display="block";
  peopleSection.style.display="none";
};
peopleTab.onclick=()=>{
  videosSection.style.display="none";
  peopleSection.style.display="block";
};

// PEOPLE TAB
async function loadUserList(){
  const usersSnap=await getDocs(collection(db,"users"));
  let html="";
  usersSnap.forEach(doc=>{
    const u=doc.data();
    const avatar=u.avatar||defaultAvatar;
    html+=`<tr>
      <td><img src="${avatar}"></td>
      <td><a onclick="openChannel('${doc.id}')">${u.username||u.email}</a></td>
      <td><a onclick="openChannel('${doc.id}')">Channel</a></td>
      <td>${new Date(u.joinTime||0).toLocaleDateString()}</td>
    </tr>`;
  });
  userList.innerHTML=html;
}

// CHANNEL VIEW
async function openChannel(uid){
  feedSection.style.display="none";
  videoPlayerSection.style.display="none";
  profileSection.style.display="block";
  myProfileBtn.style.display="none"; // hide My Profile button

  const docRef=doc(db,"users",uid);
  const docSnap=await getDoc(docRef);
  if(!docSnap.exists()) return;
  const data=docSnap.data();
  profileInfo.innerText=`Username: ${data.username}\nEmail: ${data.email||""}\nBirthdate: ${data.birthdate||"N/A"}`;
  bioInput.value=data.bio||"";

  const snap=await getDocs(collection(db,"videos"));
  let html="";
  snap.forEach(v=>{
    const vd=v.data();
    if(vd.uid===uid){
      let url=vd.url;
      if(url.includes("drive.google.com")) url=url.replace("-view","-preview");
      html+=`<div onclick="playVideo('${v.id}')">
        <iframe src="${url}" width="160" height="90"></iframe>
        <div class="videoTitle">${vd.title}</div>
      </div>`;
    }
  });
  channelVideos.innerHTML=html;
}

// PROFILE
function loadProfile(){
  const docRef=doc(db,"users",currentUser.uid);
  getDoc(docRef).then(docSnap=>{
    if(docSnap.exists()){
      const data=docSnap.data();
      profileInfo.innerText=`Username: ${data.username}\nEmail: ${currentUser.email}\nBirthdate: ${data.birthdate||'N/A'}`;
      bioInput.value=data.bio||"";
    }
  });
  myProfileBtn.style.display="inline"; // show My Profile button on own profile
}
saveBioBtn.onclick=async()=>{
  await updateDoc(doc(db,"users",currentUser.uid),{bio: bioInput.value});
  alert("Bio saved!");
}

// MY PROFILE BUTTON
myProfileBtn.onclick=()=>{
  feedSection.style.display="none";
  videoPlayerSection.style.display="none";
  profileSection.style.display="block";
  loadProfile();
};
</script>
</body>
</html>
